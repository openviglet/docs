version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      i18n:
        patterns:
          - "i18next"
          - "i18next-*"
          - "react-i18next"
    ignore:
      # Docusaurus 3.x pins react-router-dom@5; design system wants v7.
      # Locked by legacy-peer-deps until Docusaurus migrates.
      - dependency-name: "react-router-dom"
      # React major must track what Docusaurus supports; allow patch/minor only.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # Managed via "overrides" in package.json to fix Docusaurus 3.10 ProgressPlugin schema.
      - dependency-name: "webpackbar"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
